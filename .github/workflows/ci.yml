name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # [ofx] is the lightweight (pure-Python) parser extra so OFX/QFX
          # tests run here. Docling/PyTorch stays out of default CI — its
          # live tests run in the manual-dispatch ci-docling workflow.
          pip install -e ".[dev,ofx]"

      - name: Lint
        run: ruff check .

      - name: Format
        run: ruff format --check .

      - name: Typecheck
        run: mypy

      - name: Test
        run: pytest --cov=homefinance --cov-report=term-missing --cov-fail-under=80
